name: Update Fund Docs

on:
  schedule:
    # 09:00 UTC diario (11:00 Madrid) — actualización diaria de documentos
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no guardar cambios)'
        type: boolean
        default: false

jobs:
  update-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests playwright
          playwright install chromium

      - name: Fetch fund documentation
        run: |
          mkdir -p data
          python fetch_fund_docs.py --data-dir data ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Commit fund docs
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fund_docs.json
          git diff --staged --quiet || {
            git commit -m "chore: update fund docs [skip ci]"
            git pull --rebase origin main
            git push
          }
