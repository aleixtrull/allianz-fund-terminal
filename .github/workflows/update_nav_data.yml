name: Update NAV Data

on:
  schedule:
    # 07:00 UTC Mon-Sat (09:00 Madrid) — NAV de ayer publicado por Morningstar overnight
    - cron: '0 7 * * 1-6'
    # 13:00 UTC Mon-Fri (15:00 Madrid) — actualización de mediodía
    - cron: '0 13 * * 1-5'
    # 20:00 UTC Mon-Fri (22:00 Madrid) — captura NAV del día en fondos que publican rápido
    - cron: '0 20 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch fund data (incremental update)
        run: python fetch_funds_full_history.py --update --delay 0.5

      - name: Move CSVs to data/ folder
        run: |
          mkdir -p data
          [ -f nav_all_funds.csv ]     && mv nav_all_funds.csv   data/nav_all_funds.csv   || true
          [ -f nav_benchmarks.csv ]    && mv nav_benchmarks.csv  data/nav_benchmarks.csv  || true
          [ -f nav_summary.csv ]       && mv nav_summary.csv     data/nav_summary.csv     || true
          [ -f fund_composition.json ] && cp fund_composition.json data/fund_composition.json || true

      - name: Commit NAV data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/nav_all_funds.csv data/nav_benchmarks.csv data/nav_summary.csv data/fund_composition.json || true
          git diff --staged --quiet || git commit -m "chore: update NAV data [skip ci]"
          git push
